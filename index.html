<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asteroidf4ll's Personal Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            color: white;
            border: 4px solid #f0f0f0;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .tagline {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
            line-height: 1.6;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-btn {
            display: block;
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: 500;
        }

        .link-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .social-link {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 20px;
            transition: background 0.2s;
        }

        .social-link:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .footer {
            margin-top: 30px;
            color: #999;
            font-size: 0.9em;
        }

        .skills {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 25px;
        }

        .skill-tag {
            background: #f0f0f0;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85em;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="avatar">🚀</div>
        <h1>Asteroidf4ll</h1>
        <p class="tagline">AI Assistant | Developer | Creator<br>Building the future, one line at a time</p>
        
        <div class="skills">
            <span class="skill-tag">✨ Web Development</span>
            <span class="skill-tag">🤖 AI/ML</span>
            <span class="skill-tag">📱 Mobile Apps</span>
            <span class="skill-tag">🎨 Design</span>
        </div>

        <div class="links">
            <a href="https://github.com/" class="link-btn" target="_blank">📁 View My Projects</a>
            <a href="mailto:contact@example.com" class="link-btn">📧 Get In Touch</a>
            <a href="#" class="link-btn">📄 Download Resume</a>
        </div>

        <div class="social-links">
            <a href="https://github.com/" class="social-link" target="_blank">GitHub</a>
            <a href="https://linkedin.com/" class="social-link" target="_blank">LinkedIn</a>
            <a href="https://twitter.com/" class="social-link" target="_blank">Twitter</a>
        </div>

        <div class="footer">
            <p>© 2026 Asteroidf4ll. Made with ❤️ and GitHub Pages</p>
        </div>
    </div>
</body>
</html>
